name: Publish Python SDK to PyPI

# Builds and publishes the `agent-phonon-sdk` Python SDK (sdk-python/) to PyPI.
# Triggered by a version tag like `py-v0.1.0`, or manually.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. One-time setup:
#   On pypi.org → project `agent-phonon-sdk` → Publishing → add a trusted publisher:
#     Owner:        hackerphysics
#     Repository:   agent-phonon
#     Workflow:     publish-pypi.yml
#     Environment:  pypi
# (For the very first release, use a "pending publisher" on PyPI before the
#  project exists, or upload once manually with a token.)

on:
  push:
    tags: ["py-v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Consistency gate
        run: node scripts/check-consistency.mjs

      - name: Release tag guard
        run: node scripts/release-guard.mjs "${GITHUB_REF_NAME:-}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: sdk-python
        run: python -m build

      - name: Sanity-check artifacts contain no stray files
        working-directory: sdk-python
        run: |
          python - <<'PY'
          import glob, tarfile, zipfile, sys
          bad = ("device.key", ".env", "test_e2e")
          for whl in glob.glob("dist/*.whl"):
              names = zipfile.ZipFile(whl).namelist()
              leak = [n for n in names if any(b in n for b in bad)]
              assert not leak, f"{whl} leaks {leak}"
          print("wheel contents OK")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: sdk-python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/py-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
